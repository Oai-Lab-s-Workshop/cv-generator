version: '3.8'

services:
  pocketbase:
    image: ghcr.io/muchobien/pocketbase:latest
    container_name: cv-generator-pb
    restart: unless-stopped
    ports:
      - "8090:8090"
    environment:
      - POCKETBASE_ADMIN_EMAIL=admin@cv-generator.local
      - POCKETBASE_ADMIN_PASSWORD=changeme123
    volumes:
      - ./pb_data:/pb_data
      - ./pb_migrations:/pb_migrations
    healthcheck:
      test: wget --no-verbose --tries=1 --spider http://localhost:8090/api/health || exit 1
      interval: 30s
      timeout: 10s
      retries: 3

  frontend:
    image: node:20-alpine
    container_name: cv-generator-frontend
    working_dir: /app
    volumes:
      - ./frontend:/app
      - /app/node_modules
    ports:
      - "4200:4200"
    command: sh -c "npm install && npx ng serve --host 0.0.0.0"
    depends_on:
      - pocketbase
