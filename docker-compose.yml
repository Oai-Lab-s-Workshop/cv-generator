services:
  pocketbase:
    image: ghcr.io/muchobien/pocketbase:latest
    container_name: resumate-pb
    restart: unless-stopped
    ports:
      - "8090:8090"
    environment:
      TZ: UTC
      PB_HOST: 0.0.0.0
      PB_PORT: 8090
      PB_ADMIN_EMAIL: ${PB_ADMIN_EMAIL:-admin@cv-generator.local}
      PB_ADMIN_PASSWORD: ${PB_ADMIN_PASSWORD:-changeme123!}
    volumes:
      - ./pb_data:/pb_data
      - ./pb_migrations:/pb_migrations
      - ./pb_hooks:/pb_hooks
    healthcheck:
      test: wget --no-verbose --tries=1 --spider http://localhost:8090/api/health || exit 1
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  mcp:
    build:
      context: ./mcp
      dockerfile: Dockerfile
    container_name: resumate-mcp
    restart: unless-stopped
    ports:
      - "8081:8081"
    environment:
      PORT: 8081
      FRONTEND_BASE_URL: ${FRONTEND_BASE_URL:-http://localhost:4200}
      POCKETBASE_BASE_URL: http://pocketbase:8090
      POCKETBASE_SERVICE_USER_EMAIL: ${POCKETBASE_SERVICE_USER_EMAIL:-}
      POCKETBASE_SERVICE_USER_PASSWORD: ${POCKETBASE_SERVICE_USER_PASSWORD:-}
    depends_on:
      pocketbase:
        condition: service_healthy

  frontend:
    image: node:22-alpine
    container_name: resumate-web
    restart: unless-stopped
    working_dir: /workspace/frontend
    ports:
      - "4200:4200"
    environment:
      CHOKIDAR_USEPOLLING: "true"
    volumes:
      - ./:/workspace
      - frontend_node_modules:/workspace/frontend/node_modules
    command: sh -c "npm install && npm start"
    depends_on:
      pocketbase:
        condition: service_healthy

volumes:
  frontend_node_modules:
