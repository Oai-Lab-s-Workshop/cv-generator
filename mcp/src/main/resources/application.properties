spring.application.name=resumate-mcp

server.port=${PORT:8081}

spring.ai.mcp.server.protocol=STATELESS
spring.ai.mcp.server.name=resumate-mcp
spring.ai.mcp.server.version=0.1.0
spring.ai.mcp.server.instructions=Use the delegated tools to inspect CV material and create a tailored public profile URL.
spring.ai.mcp.server.capabilities.tool=true
spring.ai.mcp.server.capabilities.resource=false
spring.ai.mcp.server.capabilities.prompt=false
spring.ai.mcp.server.capabilities.completion=false
spring.ai.mcp.server.streamable-http.mcp-endpoint=/mcp

resumate.frontend.base-url=${FRONTEND_BASE_URL:http://localhost:4200}
resumate.pocketbase.base-url=${POCKETBASE_BASE_URL:http://localhost:8090}
resumate.pocketbase.service-user-email=${POCKETBASE_SERVICE_USER_EMAIL:}
resumate.pocketbase.service-user-password=${POCKETBASE_SERVICE_USER_PASSWORD:}
